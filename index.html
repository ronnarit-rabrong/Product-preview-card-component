<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
	<title>Frontend Mentor | Product preview card component</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="main-site">
		<section class="product">
			<figure class="product__media">
				<picture class="product__picture">
					<source media="(min-width: 37.5rem)" srcset="assets/images/image-product-desktop.jpg">
					<img class="product__image" src="assets/images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
				</picture>
				<figcaption class="sr-only">Product image of Gabrielle Essence Eau De Parfum</figcaption>
			</figure>
			<div class="product__details">
				<p class="product__type">Perfume</p>
				<h1 class="product__name">Gabrielle Essence Eau De Parfum</h1>
				<p class="product__info">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
				<div class="product__price">
					<p class="product__price-current"><strong>$149.99</strong></p>
					<p class="product__price-old"><del>$169.99</del></p>
				</div>
				<button class="product__btn" type="button"><img src="assets/images/icon-cart.svg" alt=""><span>Add to Cart</span></button>
			</div>
		</section>
	</main>
</body>
</html>
