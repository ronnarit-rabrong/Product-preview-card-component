<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
	<title>Frontend Mentor | Product preview card component</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="main-site">
		<article class="product">
			<picture>
				<source media="(min-width: 37.5rem)" srcset="assets/images/image-product-desktop.jpg">
				<img class="product__image" src="assets/images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
			</picture>
			<div class="product__content">
				<p class="product__text-preview">Perfume</p>
				<h2 class="product__text-heading">Gabrielle Essence Eau De Parfum</h2>
				<p class="product__text-body">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
				<div class="product__price">
					<h3 class="product__text-subheading">$149.99</h3>
					<h3 class="product__text-smaller-subheading"><del>$169.99</del></h3>
				</div>
				<button class="product__btn" type="button"><img src="assets/images/icon-cart.svg" alt="click to buy"><span>Add to Cart</span></button>
			</div>
		</article>
	</main>
</body>
</html>
